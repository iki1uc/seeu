<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>pein.html – PEIN Engine</title>
<style>
  body { background:#000; color:#0f0; font-family:monospace; }
  .log { white-space:pre; padding:10px; }
</style>
</head>
<body>
<div class="log" id="log"></div>

<script>
class PEIN {
    constructor(square, points, repos){
        this.square = square;
        this.points = points;
        this.repos  = repos;
    }

    run(){
        if(this.square){
            return {
                mode: "SQUARE_CAPTURE",
                block: { square: this.square, points: this.points }
            };
        }

        return {
            mode: "ZERO_EDIT",
            repos: this.repos.map(r => ({
                repo: r,
                zero: {x:0, y:0},
                edit: true
            }))
        };
    }
}

const engine = new PEIN(
    {x:1,y:1,w:2,h:2},
    [{id:1},{id:2},{id:3}],
    ["R1","R2","R3","R4"]
);

document.getElementById("log").textContent =
  JSON.stringify(engine.run(), null, 2);
</script>
</body>
</html>
