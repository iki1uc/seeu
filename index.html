<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>SEEÜ – BEAUTY INDEX</title>

<style>
  body {
    background:#000;
    color:#0f0;
    font-family:monospace;
    padding:40px;
    text-align:center;
  }

  h1 {
    color:#0f0;
    font-size:28px;
    margin-bottom:30px;
    animation:glow 2s infinite alternate;
  }

  @keyframes glow {
    from { text-shadow:0 0 5px #0f0; }
    to   { text-shadow:0 0 20px #0f0; }
  }

  button {
    background:#000;
    color:#0f0;
    border:1px solid #0f0;
    padding:12px 25px;
    margin:10px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
  }

  button:hover {
    background:#0f0;
    color:#000;
  }

  #log {
    margin-top:40px;
    white-space:pre;
    font-size:16px;
    border:1px solid #0f0;
    padding:20px;
    width:80%;
    margin-left:auto;
    margin-right:auto;
    min-height:120px;
  }
</style>
</head>

<body>

<h1>SEEÜ – RESPO PLAYER</h1>

<button id="btnAll">ALL</button>
<button id="btnIn">IN →</button>
<button id="btnOut">← OUT</button>
<button id="btnSet">SET</button>

<div id="log">SEEÜ bereit…</div>

<script>
// RESPO PLAYER ENGINE
class SEEUE_PLAYER {
    constructor(respos){
        this.respos = respos;
        this.index  = 0;
    }

    current(){
        return this.respos[this.index];
    }

    next(){
        this.index = (this.index + 1) % this.respos.length;
        return this.current();
    }

    prev(){
        this.index = (this.index - 1 + this.respos.length) % this.respos.length;
        return this.current();
    }
}

// BESTE RESPOS
const player = new SEEUE_PLAYER([
  "ALL","IN","OUT","SET",
  "RUN","CORE","NEXT","RAW",
  "DELTA","ECHO","ZERO","BEAM"
]);

function showRespo(mode){
    document.getElementById("log").textContent =
      "SEEÜ RESPO:\n" + mode;
}

// BUTTONS
document.getElementById("btnAll").onclick = () => showRespo(player.current());
document.getElementById("btnIn").onclick  = () => showRespo(player.next());
document.getElementById("btnOut").onclick = () => showRespo(player.prev());
document.getElementById("btnSet").onclick = () => showRespo("SET");
</script>

</body>
</html>
