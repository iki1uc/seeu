<html>
<head>
<title>SEEÜ – STARTSYSTEM (((NEU)))</title>

<style>
body { font-family: monospace; background:#111; color:#eee; padding:20px; }
h1, h2 { color:#6cf; }
.block { margin:20px 0; padding:10px; border:1px solid #444; }
button { padding:8px 14px; background:#333; color:#eee; border:1px solid #666; cursor:pointer; }
button:hover { background:#444; }
pre { background:#000; padding:10px; border:1px solid #333; }
</style>

<script>
// =========================
// SEEÜ – MASTER PANEL
// =========================

function seeuRun() {
    let f = document.getElementById("seeuInput").value;

    document.getElementById("sA").innerText = station(f, "A", "9hoch9 – Formuleria");
    document.getElementById("sB").innerText = station(f, "B", "81_81_1 – Toolomat DOM");
    document.getElementById("sC").innerText = station(f, "C", "viPIio – PIPE");
    document.getElementById("sD").innerText = station(f, "D", "WpiR – Argumenteria / RESPO");
}

function station(f, id, name) {

    let pos = (f.length + id.charCodeAt(0)) % 12;
    let mass = f.length * id.charCodeAt(0);
    let scan = f.length + " Zeichen";

    let konsequenz = "";

    if (f.includes("Φ")) konsequenz += "Achse IKI erkannt\n";
    if (f.includes("φ∞")) konsequenz += "Achse MA³ erkannt\n";
    if (f.includes("φ²")) konsequenz += "Achse UC erkannt\n";
    if (f.includes("φ")) konsequenz += "Achse BIR erkannt\n";

    if (f.includes("P4")) konsequenz += "RUN: Start\n";
    if (f.includes("P0")) konsequenz += "RUN: Wake\n";
    if (f.includes("P1")) konsequenz += "RUN: Melt\n";
    if (f.includes("P2")) konsequenz += "RUN: Merge\n";
    if (f.includes("Pe")) konsequenz += "RUN: End\n";

    return (
        name + "\n" +
        "POS = (" + pos + ", φ)\n" +
        "MASS = " + mass + "\n" +
        "SCAN = " + scan + "\n" +
        "Konsequenz:\n" + (konsequenz || "Keine erkannt.")
    );
}
</script>

</head>

<body>

<h1>SEEÜ – STARTSYSTEM (((NEU)))</h1>

<input id="seeuInput" type="text" placeholder="Φ + φ² + P4 + Orbit">
<button onclick="seeuRun()">SEEÜ starten</button>

<div class="block">
<h2>Station A – Formuleria (9hoch9)</h2>
<pre id="sA">Wartet…</pre>
</div>

<div class="block">
<h2>Station B – Toolomat DOM (81_81_1)</h2>
<pre id="sB">Wartet…</pre>
</div>

<div class="block">
<h2>Station C – PIPE (viPIio)</h2>
<pre id="sC">Wartet…</pre>
</div>

<div class="block">
<h2>Station D – Argumenteria / RESPO (WpiR)</h2>
<pre id="sD">Wartet…</pre>
</div>

</body>
</html>
