<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>naeky.html – ZERO‑QUAD‑EDIT</title>
<style>
  body { background:#000; color:#0f0; font-family:monospace; }
  .log { white-space:pre; padding:10px; }
</style>
</head>
<body>
<div class="log" id="log"></div>

<script>
class NAEKY {
    constructor(repos){
        this.repos = repos;
    }

    zeroQuadEdit(){
        return this.repos.map(r => ({
            repo: r,
            zero: {x:0, y:0},
            edit: true
        }));
    }
}

const engine = new NAEKY(["R1","R2","R3","R4"]);
document.getElementById("log").textContent =
  JSON.stringify(engine.zeroQuadEdit(), null, 2);
</script>
</body>
</html>
