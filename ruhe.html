<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ruhe.html – SEEUE Core</title>
  <style>
    body { background:#000; color:#0f0; font-family:monospace; }
    .log { white-space:pre; padding:10px; }
  </style>
</head>
<body>
<div class="log" id="log"></div>

<script>
class SEEUE {
    constructor(points, triangles, repos, chemIdGate) {
        this.points     = points;
        this.triangles  = triangles;
        this.repos      = repos;
        this.chemIdGate = chemIdGate;
    }

    selectCore(beamPossible) {
        const coreSize = Math.floor(this.points.length / 3);
        const core = this.points.slice(0, coreSize);

        const [T1, T2] = this.triangles;
        const square = this.innerSquare(T1, T2, this.repos);

        const gateOpen = this.chemIdGate === true;

        if (beamPossible && square && gateOpen) {
            return { mode: "BEAM", seeu: square };
        } else {
            return { mode: "ERROR_HELP", seeu: core };
        }
    }

    innerSquare(T1, T2, repos) {
        if (!this.intersectionExists(T1, T2)) return null;
        return { type: "square", repos, triangles: [T1, T2] };
    }

    intersectionExists(T1, T2) {
        return T1.length > 0 && T2.length > 0;
    }
}

const points = Array.from({length: 90}, (_, i) => ({ id: i }));
const T1     = [{x:0,y:0},{x:1,y:0},{x:0,y:1}];
const T2     = [{x:1,y:1},{x:2,y:1},{x:1,y:2}];
const repos  = ["R1","R2","R3","R4"];
const chemGate = true;

const seeue = new SEEUE(points, [T1, T2], repos, chemGate);
const result = seeue.selectCore(true);

document.getElementById("log").textContent =
  "ruhe.html\n\nMODE: " + result.mode + "\n\nSEEUE:\n" +
  JSON.stringify(result.seeu, null, 2);
</script>
</body>
</html>
